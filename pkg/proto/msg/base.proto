syntax = "proto3";

package msg;

option go_package = "pkg/proto/msg";

// ---- 心跳 ----

// 心跳请求（客户端 → 服务端）
message HeartbeatReq {}

// 心跳响应（服务端 → 客户端）
message HeartbeatResp {
  int32  code = 1; // 状态码：0=成功
  string msg  = 2; // 提示信息
}

// ---- 登录 ----

// 登录请求（客户端 → 登录服）
message LoginReq {
  string username = 1; // 用户名
  string password = 2; // 密码
}

// 登录响应（登录服 → 客户端）
message LoginResp {
  int32  code      = 1; // 状态码：0=成功，非0=失败
  string msg       = 2; // 提示信息
  string token     = 3; // 登录令牌，后续请求携带
  int64  player_id = 4; // 玩家 ID
}

message RegisterReq {
    string username = 1;
    string password = 2;
}
message RegisterResp {
    int32 code = 1;
    string msg = 2;
    uint64 player_id = 3;
}

// ---- 通用 ----

// 错误响应（服务端 → 客户端）
message ErrorResp {
  int32  code = 1; // 错误码
  string msg  = 2; // 错误描述
}

// ---- 匹配 ----

// 发起匹配请求（客户端 → 游戏服）
message MatchStartReq {}

// 发起匹配响应（游戏服 → 客户端）
message MatchStartResp {
  int32  code       = 1; // 业务状态码，0 成功，非 0 失败
  string msg        = 2; // 提示信息
  string room_id    = 3; // 房间 ID，匹配成功时返回
  bool   is_matched = 4; // 是否已匹配成功
}

// 取消匹配请求（客户端 → 游戏服）
message MatchCancelReq {}

// 取消匹配响应（游戏服 → 客户端）
message MatchCancelResp {
  int32  code = 1; // 业务状态码，0 成功，非 0 失败
  string msg  = 2; // 提示信息
}

// ---- 清空匹配队列（测试用） ----

// 清空匹配队列请求（客户端 → 游戏服）
message ClearMatchQueueReq {}

// 清空匹配队列响应（游戏服 → 客户端）
message ClearMatchQueueResp {
  int32  code = 1; // 业务状态码，0 成功，非 0 失败
  string msg  = 2; // 提示信息
}