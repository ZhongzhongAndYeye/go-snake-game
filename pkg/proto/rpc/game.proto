// 游戏服务 protobuf 定义
// 包含匹配、房间管理三个 RPC 接口

syntax = "proto3";

package rpc;
option go_package = "pkg/proto/rpc;rpc";

// GameService 游戏服务，处理玩家匹配和房间信息查询。
service GameService {
  // StartMatch 发起匹配
  rpc StartMatch(StartMatchRequest) returns (StartMatchResponse);
  // CancelMatch 取消匹配
  rpc CancelMatch(CancelMatchRequest) returns (CancelMatchResponse);
  // GetRoomInfo 获取当前房间信息
  rpc GetRoomInfo(GetRoomInfoRequest) returns (GetRoomInfoResponse);
}

// PlayerInfo 玩家信息
message PlayerInfo {
  uint64 player_id = 1; // 玩家 ID
  string nickname  = 2; // 玩家昵称
  int32  score     = 3; // 玩家分数
}

// StartMatchRequest 发起匹配请求
message StartMatchRequest {
  uint64 player_id = 1; // 玩家 ID
  string nickname  = 2; // 玩家昵称
}

// StartMatchResponse 发起匹配响应
message StartMatchResponse {
  int32  code        = 1; // 业务状态码，0 成功，非 0 失败
  string msg         = 2; // 提示信息
  string room_id     = 3; // 房间 ID，匹配成功时返回
  bool   is_matched  = 4; // 是否已匹配成功
}

// CancelMatchRequest 取消匹配请求
message CancelMatchRequest {
  uint64 player_id = 1; // 玩家 ID
}

// CancelMatchResponse 取消匹配响应
message CancelMatchResponse {
  int32  code = 1; // 业务状态码，0 成功，非 0 失败
  string msg  = 2; // 提示信息
}

// GetRoomInfoRequest 获取房间信息请求
message GetRoomInfoRequest {
  string room_id = 1; // 房间 ID
}

// GetRoomInfoResponse 获取房间信息响应
message GetRoomInfoResponse {
  int32         code    = 1; // 业务状态码，0 成功，非 0 失败
  string        msg     = 2; // 提示信息
  string        room_id = 3; // 房间 ID
  repeated PlayerInfo players = 4; // 房间内玩家列表
  int32         status  = 5; // 房间状态，0 等待中，1 游戏中，2 已结束
}