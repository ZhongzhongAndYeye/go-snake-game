// 游戏服务 protobuf 定义
// 包含匹配、房间管理三个 RPC 接口

syntax = "proto3";

package rpc;
option go_package = "pkg/proto/rpc;rpc";

// GameService 游戏服务，处理玩家匹配、房间信息查询和游戏操作。
service GameService {
  // StartMatch 发起匹配
  rpc StartMatch(StartMatchRequest) returns (StartMatchResponse);
  // CancelMatch 取消匹配
  rpc CancelMatch(CancelMatchRequest) returns (CancelMatchResponse);
  // GetRoomInfo 获取当前房间信息
  rpc GetRoomInfo(GetRoomInfoRequest) returns (GetRoomInfoResponse);
  // PlayerOperation 玩家游戏操作（如方向变更）
  rpc PlayerOperation(PlayerOperationRequest) returns (PlayerOperationResponse);
  // PlayerOffline 玩家离线通知（网关回调）
  // 玩家 WebSocket 断开连接时，网关调用此接口通知游戏服。
  // 游戏服根据玩家当前状态做相应处理：
  //   - 游戏中：标记蛇死亡，触发游戏结束判定
  //   - 匹配中：从匹配队列移除
  rpc PlayerOffline(PlayerOfflineRequest) returns (PlayerOfflineResponse);
  // GetGlobalRank 查询全服排行榜
  // 返回 Top100 玩家排名，按分数从高到低排序。
  rpc GetGlobalRank(GetGlobalRankRequest) returns (GetGlobalRankResponse);
}

// Point 网格坐标点
message Point {
  int32 x = 1;
  int32 y = 2;
}

// SnakeState 蛇的当前状态
message SnakeState {
  uint64 player_id = 1;
  string nickname  = 2;
  repeated Point body = 3;
  int32  score     = 4;
  bool   is_alive  = 5;
}

// FoodState 食物状态
message FoodState {
  Point position = 1;
  int32 score    = 2;
}

// PlayerInfo 玩家信息
message PlayerInfo {
  uint64 player_id = 1; // 玩家 ID
  string nickname  = 2; // 玩家昵称
  int32  score     = 3; // 玩家分数
}

// StartMatchRequest 发起匹配请求
message StartMatchRequest {
  uint64 player_id = 1; // 玩家 ID
  string nickname  = 2; // 玩家昵称
}

// StartMatchResponse 发起匹配响应
message StartMatchResponse {
  int32  code        = 1; // 业务状态码，0 成功，非 0 失败
  string msg         = 2; // 提示信息
  string room_id     = 3; // 房间 ID，匹配成功时返回
  bool   is_matched  = 4; // 是否已匹配成功
}

// CancelMatchRequest 取消匹配请求
message CancelMatchRequest {
  uint64 player_id = 1; // 玩家 ID
}

// CancelMatchResponse 取消匹配响应
message CancelMatchResponse {
  int32  code = 1; // 业务状态码，0 成功，非 0 失败
  string msg  = 2; // 提示信息
}

// GetRoomInfoRequest 获取房间信息请求
message GetRoomInfoRequest {
  string room_id = 1; // 房间 ID
}

// GetRoomInfoResponse 获取房间信息响应
message GetRoomInfoResponse {
  int32          code       = 1; // 业务状态码，0 成功，非 0 失败
  string         msg        = 2; // 提示信息
  string         room_id    = 3; // 房间 ID
  repeated PlayerInfo players    = 4; // 房间内玩家列表
  int32          status     = 5; // 房间状态，0 等待中，1 游戏中，2 已结束
  int32          game_status = 6; // 游戏阶段：1 未开始，2 进行中，3 暂停，4 已结束
  int64          frame      = 7; // 当前帧序号
  repeated SnakeState snakes    = 8; // 所有蛇的当前状态
  FoodState      food       = 9; // 当前食物位置
}

// PlayerOperationRequest 玩家游戏操作请求
message PlayerOperationRequest {
  uint64 player_id = 1; // 玩家 ID
  string room_id   = 2; // 房间 ID
  int32  direction = 3; // 方向：1 上，2 下，3 左，4 右
}

// PlayerOperationResponse 玩家游戏操作响应
message PlayerOperationResponse {
  int32  code = 1; // 业务状态码，0 成功，非 0 失败
  string msg  = 2; // 提示信息
}

// PlayerOfflineRequest 玩家离线通知请求
message PlayerOfflineRequest {
  uint64 player_id = 1; // 离线玩家 ID
  string room_id   = 2; // 房间 ID，网关已知时传入；为空时游戏服自行查找
}

// PlayerOfflineResponse 玩家离线通知响应
message PlayerOfflineResponse {
  int32  code = 1; // 业务状态码，0 成功，非 0 失败
  string msg  = 2; // 提示信息
}

// GetGlobalRankRequest 查询全服排行榜请求
message GetGlobalRankRequest {}

// GetGlobalRankResponse 查询全服排行榜响应
message GetGlobalRankResponse {
  int32  code = 1; // 业务状态码，0 成功，非 0 失败
  string msg  = 2; // 提示信息
  repeated RankItem list = 3; // 排行榜条目列表
}

// RankItem 排行榜条目
message RankItem {
  uint64 player_id = 1; // 玩家 ID
  int32  score     = 2; // 玩家得分
  int32  rank      = 3; // 排名，从 1 开始
}